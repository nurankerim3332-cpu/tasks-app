<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДАОГруп — Задачи</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.12);
    --text: #ffffff;
    --hint: rgba(255,255,255,0.4);
    --hint2: rgba(255,255,255,0.6);
    --accent: #ffffff;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  .nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: rgba(10,10,10,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-size: 15px; font-weight: 700;
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text);
  }

  .nav-right { display: flex; align-items: center; gap: 8px; }

  .nav-btn {
    padding: 7px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .nav-btn-ghost {
    border: none; background: transparent;
    color: var(--hint2);
  }
  .nav-btn-ghost:active { color: var(--text); }
  .nav-btn-solid {
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
  }
  .nav-btn-solid:active { background: #2a2a2a; }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 48px 20px 0;
    position: relative;
  }

  .hero-tag {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 4px 12px 4px 6px;
    font-size: 12px; color: var(--hint2);
    margin-bottom: 24px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .hero-tag:hover { border-color: rgba(255,255,255,0.25); }
  .hero-tag-badge {
    background: var(--text); color: var(--bg);
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 10px;
  }

  .hero-title {
    font-size: clamp(52px, 13vw, 80px);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -3px;
    margin-bottom: 20px;
    color: var(--text);
  }

  .hero-sub {
    font-size: 15px; color: var(--hint2);
    line-height: 1.6; margin-bottom: 32px;
    font-weight: 400;
  }

  /* ── STATS STRIP ── */
  .stats-strip {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 32px;
  }
  .stat-item {
    padding: 0 20px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat-item:last-child { border-right: none; }
  .stat-item:first-child { padding-left: 0; }
  .stat-num {
    font-size: 28px; font-weight: 800;
    letter-spacing: -1px; line-height: 1;
    margin-bottom: 2px;
  }
  .stat-label { font-size: 11px; color: var(--hint); font-weight: 500; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex; justify-content: center;
    gap: 4px; margin-bottom: 24px;
    flex-wrap: wrap; padding: 0 16px;
  }

  .pill {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent; color: var(--hint2);
    font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }
  .pill.active {
    background: var(--text); color: var(--bg);
    border-color: var(--text);
  }
  .pill:not(.active):hover { border-color: var(--border2); color: var(--text); }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative; max-width: 420px;
    margin: 0 auto 28px; padding: 0 16px;
  }
  .search-wrap input {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px 10px 36px;
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--border2); }
  .search-wrap input::placeholder { color: var(--hint); }
  .search-icon {
    position: absolute; left: 28px; top: 50%;
    transform: translateY(-50%); color: var(--hint); font-size: 13px; pointer-events: none;
  }

  /* ── TASK LIST ── */
  .task-list { padding: 0 16px 120px; max-width: 680px; margin: 0 auto; }

  .task-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    animation: fadeUp 0.3s ease both;
    background: transparent;
    display: flex; align-items: center; gap: 12px;
  }
  .task-card:hover { background: var(--surface); border-color: var(--border2); }
  .task-card:active { transform: scale(0.995); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .task-dot.high   { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .task-dot.medium { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .task-dot.low    { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .task-dot.normal { background: var(--hint); }

  .task-main { flex: 1; min-width: 0; }
  .task-title {
    font-size: 14px; font-weight: 600; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .task-meta { display: flex; gap: 10px; align-items: center; }
  .task-meta-item { font-size: 11px; color: var(--hint); }
  .task-meta-item.overdue { color: var(--red); }

  .task-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    flex-shrink: 0;
  }
  .task-badge.new      { background: rgba(255,255,255,0.06); color: var(--hint2); }
  .task-badge.progress { background: rgba(251,191,36,0.12); color: var(--amber); }
  .task-badge.done     { background: rgba(74,222,128,0.12); color: var(--green); }
  .task-badge.hold     { background: rgba(255,255,255,0.04); color: var(--hint); }
  .task-badge.review   { background: rgba(248,113,113,0.12); color: var(--red); }

  /* ── GLOBE DECORATION ── */
  .globe-wrap {
    position: fixed;
    bottom: -60px; left: 50%;
    transform: translateX(-50%);
    width: 340px; height: 340px;
    pointer-events: none; z-index: 0;
    opacity: 0.35;
  }
  .globe-wrap canvas { width: 100%; height: 100%; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 28px; right: 20px; z-index: 150;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--text); border: none;
    color: var(--bg); font-size: 24px; font-weight: 300;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(255,255,255,0.15);
    transition: all 0.15s;
  }
  .fab:active { transform: scale(0.93); }
  .fab:hover { box-shadow: 0 8px 32px rgba(255,255,255,0.2); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    z-index: 200; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 44px; width: 100%; max-height: 85vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 18px; line-height: 1.3; }

  .detail-row { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 11px; color: var(--hint); font-weight: 600; min-width: 90px; padding-top: 1px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-value { font-size: 13px; flex: 1; }

  .close-btn {
    width: 100%; padding: 13px; border-radius: 12px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 20px;
    transition: all 0.15s;
  }
  .close-btn:hover { background: var(--surface2); border-color: var(--border2); }

  /* ── ADD MODAL ── */
  .add-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
    z-index: 300; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .add-modal-overlay.open { opacity: 1; pointer-events: all; }
  .add-modal {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 20px 20px 0 0;
    padding: 20px 20px 44px; width: 100%; max-height: 92vh; overflow-y: auto;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .add-modal-overlay.open .add-modal { transform: translateY(0); }

  .add-modal h2 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 20px; }

  .form-field { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--hint); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-label span { color: var(--red); }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.15s; -webkit-appearance: none;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--border2); }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--hint); }
  .form-textarea { resize: none; height: 80px; line-height: 1.5; }
  .form-select option { background: #1c1c1c; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .submit-btn {
    width: 100%; padding: 13px; border-radius: 12px; border: none;
    background: var(--text); color: var(--bg);
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 6px; transition: all 0.15s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .cancel-btn {
    width: 100%; padding: 12px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent;
    color: var(--hint2); font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px;
  }

  .form-success { text-align: center; padding: 40px 20px; }
  .form-success .icon { font-size: 48px; margin-bottom: 16px; }
  .form-success h3 { font-size: 20px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
  .form-success p { font-size: 13px; color: var(--hint2); margin-bottom: 24px; }

  .center-msg { text-align: center; padding: 60px 20px; color: var(--hint); }
  .center-msg .icon { font-size: 40px; margin-bottom: 12px; }
  .center-msg p { font-size: 13px; }
  .empty-filtered { text-align: center; padding: 60px 20px; color: var(--hint); font-size: 13px; }

  .skeleton-row {
    height: 56px; border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 6px;
    background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.02) 50%, var(--surface) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 0.8s linear infinite; }

  /* Globe CSS animation fallback */
  .globe-svg {
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a4a7a, #0a1f3d 50%, #020810);
    box-shadow:
      inset -40px -40px 80px rgba(0,0,0,0.8),
      inset 20px 20px 60px rgba(30,80,160,0.3),
      0 0 80px rgba(30,80,160,0.15),
      0 0 160px rgba(30,80,160,0.08);
    position: relative; overflow: hidden;
    animation: globeSpin 20s linear infinite;
  }
  @keyframes globeSpin { to { filter: hue-rotate(10deg); } }
  .globe-svg::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background:
      radial-gradient(ellipse 60% 30% at 40% 50%, rgba(60,120,200,0.4) 0%, transparent 100%),
      radial-gradient(ellipse 40% 20% at 70% 30%, rgba(80,160,100,0.3) 0%, transparent 100%),
      radial-gradient(ellipse 50% 25% at 30% 70%, rgba(80,160,100,0.25) 0%, transparent 100%);
  }
  .globe-svg::after {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08) 0%, transparent 60%);
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">
    <div class="nav-logo-dot"></div>
    ДАОГруп
  </div>
  <div class="nav-right">
    <button class="nav-btn nav-btn-ghost" id="refreshBtn">↻ Обновить</button>
    <button class="nav-btn nav-btn-solid" id="fabNavBtn">+ Задача</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-tag">
    <span class="hero-tag-badge">Live</span>
    Мониторинг задач в реальном времени ›
  </div>
  <div class="hero-title">Задачи.<br>Под контролем.</div>
  <div class="hero-sub">Управляй командой и дедлайнами.<br>Всё в одном месте.</div>

  <!-- Stats strip -->
  <div class="stats-strip">
    <div class="stat-item">
      <div class="stat-num" id="sTotal">—</div>
      <div class="stat-label">Всего</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:var(--amber)" id="sProgress">—</div>
      <div class="stat-label">В работе</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:var(--green)" id="sDone">—</div>
      <div class="stat-label">Готово</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:var(--red)" id="sOverdue">—</div>
      <div class="stat-label">Просрочено</div>
    </div>
  </div>
</div>

<!-- FILTER + SEARCH -->
<div class="filter-bar" id="statusFilters">
  <button class="pill active" data-status="all">Все</button>
  <button class="pill" data-status="new">Новые</button>
  <button class="pill" data-status="progress">В работе</button>
  <button class="pill" data-status="review">Проверка</button>
  <button class="pill" data-status="done">Готово</button>
  <button class="pill" data-status="hold">Пауза</button>
</div>

<div class="search-wrap">
  <span class="search-icon">⌕</span>
  <input type="text" id="searchInput" placeholder="Поиск задач...">
</div>

<!-- TASK LIST -->
<div class="task-list" id="taskList">
  <div class="skeleton-row"></div>
  <div class="skeleton-row" style="opacity:0.6"></div>
  <div class="skeleton-row" style="opacity:0.3"></div>
  <div class="skeleton-row" style="opacity:0.15"></div>
</div>

<!-- GLOBE -->
<div class="globe-wrap">
  <div class="globe-svg"></div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <button class="close-btn" id="closeModal">Закрыть</button>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn">+</button>

<!-- Add Task Modal -->
<div class="add-modal-overlay" id="addModalOverlay">
  <div class="add-modal">
    <div class="modal-handle"></div>
    <div id="addFormContent">
      <h2>Новая задача</h2>
      <div class="form-field">
        <label class="form-label">Название <span>*</span></label>
        <input class="form-input" id="fTitle" placeholder="Введите название..." maxlength="200">
      </div>
      <div class="form-field">
        <label class="form-label">Описание</label>
        <textarea class="form-textarea" id="fDesc" placeholder="Подробное описание..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="form-label">Приоритет</label>
          <select class="form-select" id="fPriority">
            <option value="Нормальный">Нормальный</option>
            <option value="Низкий">Низкий</option>
            <option value="Высокий">Высокий</option>
            <option value="Критично">Критично</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Статус</label>
          <select class="form-select" id="fStatus">
            <option value="Новая">Новая</option>
            <option value="В процессе">В процессе</option>
            <option value="На проверке">На проверке</option>
            <option value="Выполнено">Выполнено</option>
          </select>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Ответственный</label>
        <input class="form-input" id="fAssigned" placeholder="Имя сотрудника...">
      </div>
      <div class="form-field">
        <label class="form-label">Дедлайн</label>
        <input class="form-input" type="date" id="fDueDate">
      </div>
      <button class="submit-btn" id="submitTaskBtn">Создать задачу</button>
      <button class="cancel-btn" id="cancelAddBtn">Отмена</button>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp || { ready:()=>{}, expand:()=>{}, BackButton:{show:()=>{},hide:()=>{},onClick:()=>{},offClick:()=>{}} };
  tg.ready(); tg.expand();

  const API_URL     = 'https://default98f669c93c304d33969094a178c687.11.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ff3cbd1dc1524e3fb6a57cb83635138a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=5zrRQuxYpDzc9fdL-79dXiIXABAUUPiCAIM7TzwyuN8';
  const ADD_API_URL = 'https://default98f669c93c304d33969094a178c687.11.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6a899ff8611c42b480e981d873abd065/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=bopzWCudXSdWiZ9vzn0Mp9TxeYS94Kc5cym13rblt5U';

  let allTasks=[], activeStatus='all', searchQuery='';

  function getStatusKey(s){if(!s)return'new';const v=s.toLowerCase();if(v.includes('процес')||v.includes('работ')||v.includes('progress'))return'progress';if(v.includes('выполн')||v.includes('готов')||v.includes('done')||v.includes('завершен'))return'done';if(v.includes('пауз')||v.includes('hold'))return'hold';if(v.includes('провер')||v.includes('review'))return'review';return'new';}
  function getStatusLabel(k){return{new:'Новая',progress:'В работе',done:'Готово',hold:'Пауза',review:'Проверка'}[k]||k;}
  function getPriorityKey(p){if(!p)return'normal';const v=p.toLowerCase();if(v.includes('критич')||v.includes('высок')||v.includes('high'))return'high';if(v.includes('средн')||v.includes('medium'))return'medium';if(v.includes('низк')||v.includes('low'))return'low';return'normal';}
  function formatDate(d){if(!d)return null;try{return new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}catch{return d;}}
  function isOverdue(d){return d?new Date(d)<new Date():false;}

  async function loadTasks(){
    const btn=document.getElementById('refreshBtn'); btn.classList.add('spinning');
    try{
      const res=await fetch(API_URL,{method:'POST'}); const text=await res.text();
      let data; try{data=JSON.parse(text);}catch{data={};}
      let items=[];
      if(Array.isArray(data))items=data;
      else if(Array.isArray(data.value))items=data.value;
      else if(Array.isArray(data.tasks))items=data.tasks;
      else if(data.body){const b=typeof data.body==='string'?JSON.parse(data.body):data.body;items=Array.isArray(b)?b:(Array.isArray(b.value)?b.value:[]);}
      else{for(const k of Object.keys(data)){if(Array.isArray(data[k])){items=data[k];break;}}}
      allTasks=items.map(item=>{
        const f=item.fields||item;
        const ev=field=>!field?'':typeof field==='string'?field:field.Value||field.LookupValue||field.Title||String(field.Id||'');
        const eu=field=>!field?'':typeof field==='string'?field:field.DisplayName||field.LookupValue||(field.Claims?field.Claims.match(/\|([^|]+)$/)?.[1]||field.Claims:'');
        return{id:f.id||f.ID||Math.random(),title:f.Title||f.Название||'Без названия',description:f.Description||f['Описание задач']||f.Описание||'',status:ev(f.Status||f.Статус||f['Статус задачи']),priority:ev(f.Priority||f.Приоритет||f['Приоритет Value']),assigned:eu(f.AssignedTo||f.Assignedto0||f.Ответственный||f.Assigned),dueDate:f.DueDate||f['Дата завершения']||f.Deadline||null};
      });
      updateStats(); renderTasks();
    }catch(e){document.getElementById('taskList').innerHTML=`<div class="center-msg"><div class="icon">⚠️</div><p>Ошибка загрузки.<br>${e.message}</p></div>`;}
    finally{btn.classList.remove('spinning');}
  }

  function updateStats(){
    document.getElementById('sTotal').textContent=allTasks.length;
    document.getElementById('sProgress').textContent=allTasks.filter(t=>getStatusKey(t.status)==='progress').length;
    document.getElementById('sDone').textContent=allTasks.filter(t=>getStatusKey(t.status)==='done').length;
    document.getElementById('sOverdue').textContent=allTasks.filter(t=>isOverdue(t.dueDate)&&getStatusKey(t.status)!=='done').length;
  }

  function renderTasks(){
    const list=document.getElementById('taskList');
    let tasks=allTasks;
    if(activeStatus!=='all')tasks=tasks.filter(t=>getStatusKey(t.status)===activeStatus);
    if(searchQuery)tasks=tasks.filter(t=>t.title.toLowerCase().includes(searchQuery.toLowerCase()));
    if(!tasks.length){list.innerHTML=`<div class="empty-filtered">Задач не найдено</div>`;return;}
    list.innerHTML=tasks.map((t,i)=>{
      const sk=getStatusKey(t.status),pk=getPriorityKey(t.priority),due=formatDate(t.dueDate),over=isOverdue(t.dueDate)&&sk!=='done';
      return`<div class="task-card" style="animation-delay:${i*0.03}s" onclick="openDetail(${JSON.stringify(t).replace(/"/g,'&quot;')})">
        <div class="task-dot ${pk}"></div>
        <div class="task-main">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">
            ${t.assigned?`<span class="task-meta-item">${t.assigned}</span>`:''}
            ${due?`<span class="task-meta-item ${over?'overdue':''}">${due}${over?' ·  Просрочено':''}</span>`:''}
          </div>
        </div>
        <span class="task-badge ${sk}">${getStatusLabel(sk)}</span>
      </div>`;
    }).join('');
  }

  function openDetail(task){
    if(typeof task==='string')task=JSON.parse(task);
    const sk=getStatusKey(task.status),due=formatDate(task.dueDate),over=isOverdue(task.dueDate)&&sk!=='done';
    document.getElementById('modalTitle').textContent=task.title;
    document.getElementById('modalBody').innerHTML=`
      <div class="detail-row"><div class="detail-label">Статус</div><div class="detail-value"><span class="task-badge ${sk}">${getStatusLabel(sk)}</span></div></div>
      ${task.assigned?`<div class="detail-row"><div class="detail-label">Ответственный</div><div class="detail-value">${task.assigned}</div></div>`:''}
      ${due?`<div class="detail-row"><div class="detail-label">Дедлайн</div><div class="detail-value" style="${over?'color:var(--red)':''}">${due}${over?' · Просрочено':''}</div></div>`:''}
      ${task.description?`<div class="detail-row"><div class="detail-label">Описание</div><div class="detail-value" style="color:rgba(255,255,255,0.5);font-size:13px;line-height:1.6">${task.description}</div></div>`:''}`;
    document.getElementById('modalOverlay').classList.add('open');
    tg.BackButton.offClick(closeDetail); tg.BackButton.show(); tg.BackButton.onClick(closeDetail);
  }
  function closeDetail(){document.getElementById('modalOverlay').classList.remove('open');tg.BackButton.hide();}

  const FORM_HTML=document.getElementById('addFormContent').innerHTML;
  function openAddModal(){
    document.getElementById('addFormContent').innerHTML=FORM_HTML;
    document.getElementById('submitTaskBtn').onclick=submitTask;
    document.getElementById('cancelAddBtn').onclick=closeAddModal;
    document.getElementById('addModalOverlay').classList.add('open');
    tg.BackButton.offClick(closeAddModal); tg.BackButton.show(); tg.BackButton.onClick(closeAddModal);
  }
  function closeAddModal(){document.getElementById('addModalOverlay').classList.remove('open');tg.BackButton.hide();}

  async function submitTask(){
    const title=document.getElementById('fTitle').value.trim();
    if(!title){document.getElementById('fTitle').focus();document.getElementById('fTitle').style.borderColor='var(--red)';return;}
    document.getElementById('fTitle').style.borderColor='';
    const btn=document.getElementById('submitTaskBtn'); btn.disabled=true; btn.textContent='Создаём...';
    const payload={Title:title,Description:document.getElementById('fDesc').value.trim(),Priority:document.getElementById('fPriority').value,Status:document.getElementById('fStatus').value,Assigned:document.getElementById('fAssigned').value.trim(),DueDate:document.getElementById('fDueDate').value||null};
    try{
      const res=await fetch(ADD_API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(res.ok||res.status===202){
        document.getElementById('addFormContent').innerHTML=`<div class="form-success"><div class="icon">✓</div><h3>Задача создана</h3><p>"${title}" добавлена в список</p><button class="submit-btn" onclick="closeAddModal();loadTasks();">Обновить список</button><button class="cancel-btn" onclick="closeAddModal()">Закрыть</button></div>`;
      }else throw new Error('HTTP '+res.status);
    }catch(e){btn.disabled=false;btn.textContent='Создать задачу';alert('Ошибка: '+e.message);}
  }

  document.getElementById('closeModal').onclick=closeDetail;
  document.getElementById('modalOverlay').onclick=e=>{if(e.target===document.getElementById('modalOverlay'))closeDetail();};
  document.getElementById('refreshBtn').onclick=loadTasks;
  document.getElementById('fabBtn').onclick=openAddModal;
  document.getElementById('fabNavBtn').onclick=openAddModal;
  document.getElementById('addModalOverlay').onclick=e=>{if(e.target===document.getElementById('addModalOverlay'))closeAddModal();};
  document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderTasks();});
  document.getElementById('statusFilters').addEventListener('click',e=>{
    const pill=e.target.closest('.pill[data-status]');if(!pill)return;
    document.querySelectorAll('[data-status]').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active'); activeStatus=pill.dataset.status; renderTasks();
  });

  loadTasks();
</script>
</body>
</html>
