<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вариант 2 — Glassmorphism</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --glass: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.1);
    --glass-hover: rgba(255,255,255,0.08);
    --text: #f0f0ff;
    --hint: rgba(240,240,255,0.4);
    --a1: #7c6dfa;
    --a2: #fa6d8a;
    --a3: #6dfab1;
    --a4: #facc6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated gradient mesh background */
  .bg-mesh {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
  }
  .bg-mesh::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,109,250,0.18) 0%, transparent 70%);
    top: -200px; left: -100px;
    animation: float1 8s ease-in-out infinite;
  }
  .bg-mesh::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(250,109,138,0.15) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    animation: float2 10s ease-in-out infinite;
  }
  .bg-orb {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(109,250,177,0.1) 0%, transparent 70%);
    top: 40%; left: 30%;
    animation: float3 12s ease-in-out infinite;
  }
  @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(50px,30px) scale(1.1)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-40px,-50px) scale(1.15)} }
  @keyframes float3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-30px,40px) scale(0.9)} }

  .app { position: relative; z-index: 1; }

  /* Header */
  .header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--glass-border);
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,13,26,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .header-top {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, var(--a1), var(--a2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .refresh-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(10px);
    color: var(--hint);
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .refresh-btn:active { color: var(--a1); border-color: var(--a1); }

  .search-wrap {
    position: relative; margin-bottom: 12px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    backdrop-filter: blur(10px);
    padding: 10px 14px 10px 38px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: var(--a1);
    box-shadow: 0 0 0 3px rgba(124,109,250,0.15);
  }
  .search-wrap input::placeholder { color: var(--hint); }
  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--hint); font-size: 15px; pointer-events: none;
  }

  .filters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
  .filters::-webkit-scrollbar { display: none; }

  .pill {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(10px);
    color: var(--hint);
    font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .pill.active {
    background: linear-gradient(135deg, var(--a1), var(--a2));
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 15px rgba(124,109,250,0.3);
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px; padding: 12px 16px;
  }
  .stat-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    padding: 12px 8px;
    text-align: center;
    transition: all 0.2s;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    line-height: 1; margin-bottom: 2px;
  }
  .stat-label { font-size: 10px; color: var(--hint); font-weight: 500; }

  /* Task list */
  .task-list { padding: 0 16px 100px; }

  .task-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeUp 0.3s ease both;
    position: relative;
    overflow: hidden;
  }
  .task-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  }
  .task-card:active { transform: scale(0.98); border-color: rgba(124,109,250,0.4); }
  .task-card:hover { background: var(--glass-hover); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px; margin-bottom: 6px;
  }
  .task-title { font-size: 14px; font-weight: 600; line-height: 1.3; flex: 1; }

  .priority-pill {
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px;
    flex-shrink: 0;
  }
  .priority-pill.high   { background: rgba(250,109,138,0.2); color: var(--a2); }
  .priority-pill.medium { background: rgba(250,204,109,0.2); color: var(--a4); }
  .priority-pill.low    { background: rgba(109,250,177,0.2); color: var(--a3); }
  .priority-pill.normal { background: rgba(255,255,255,0.06); color: var(--hint); }

  .task-desc {
    font-size: 12px; color: var(--hint);
    line-height: 1.4; margin-bottom: 10px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .task-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge.new       { background: rgba(124,109,250,0.15); color: #a89dff; }
  .badge.progress  { background: rgba(250,204,109,0.15); color: var(--a4); }
  .badge.done      { background: rgba(109,250,177,0.15); color: var(--a3); }
  .badge.hold      { background: rgba(255,255,255,0.06); color: var(--hint); }
  .badge.review    { background: rgba(250,109,138,0.15); color: var(--a2); }

  .meta-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--hint); }
  .meta-item.overdue { color: var(--a2); }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--a1), var(--a2));
    border: none; color: #fff; font-size: 28px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(124,109,250,0.4);
    z-index: 150; transition: all 0.2s;
  }
  .fab:active { transform: scale(0.92); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    z-index: 200; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: rgba(18,18,35,0.9);
    border: 1px solid var(--glass-border);
    border-top: none; border-radius: 28px 28px 0 0;
    backdrop-filter: blur(30px);
    padding: 20px 20px 40px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle { width: 40px; height: 4px; background: var(--glass-border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 16px; line-height: 1.3; }

  .detail-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
  .detail-label { font-size: 11px; color: var(--hint); font-weight: 600; min-width: 100px; padding-top: 2px; }
  .detail-value { font-size: 13px; font-weight: 500; flex: 1; }

  .divider { height: 1px; background: var(--glass-border); margin: 14px 0; }

  .close-btn {
    width: 100%; padding: 13px; border-radius: 16px; border: 1px solid var(--glass-border);
    background: var(--glass);
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px;
    backdrop-filter: blur(10px); transition: all 0.2s;
  }
  .close-btn:hover { border-color: var(--a1); color: var(--a1); }

  /* Add modal */
  .add-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    z-index: 300; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .add-modal-overlay.open { opacity: 1; pointer-events: all; }
  .add-modal {
    background: rgba(18,18,35,0.95); border: 1px solid var(--glass-border); border-top: none;
    border-radius: 28px 28px 0 0; backdrop-filter: blur(30px);
    padding: 20px 20px 40px; width: 100%; max-height: 92vh; overflow-y: auto;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .add-modal-overlay.open .add-modal { transform: translateY(0); }
  .add-modal h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 20px; background: linear-gradient(135deg, var(--a1), var(--a2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  .form-field { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--hint); margin-bottom: 6px; display: block; }
  .form-label span { color: var(--a2); }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 14px; padding: 11px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none;
    backdrop-filter: blur(10px);
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--a1); box-shadow: 0 0 0 3px rgba(124,109,250,0.15);
  }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--hint); }
  .form-textarea { resize: none; height: 80px; line-height: 1.5; }
  .form-select option { background: #12121f; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .submit-btn {
    width: 100%; padding: 14px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, var(--a1), var(--a2));
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px;
    box-shadow: 0 8px 24px rgba(124,109,250,0.3); transition: all 0.2s;
  }
  .submit-btn:hover { box-shadow: 0 12px 32px rgba(124,109,250,0.4); transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .cancel-btn {
    width: 100%; padding: 12px; border-radius: 14px;
    border: 1px solid var(--glass-border); background: var(--glass);
    color: var(--hint); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
  }

  .form-success { text-align: center; padding: 30px 20px; }
  .form-success .icon { font-size: 52px; margin-bottom: 12px; }
  .form-success h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 6px; background: linear-gradient(135deg, var(--a3), var(--a1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .form-success p { font-size: 13px; color: var(--hint); }

  .center-msg { text-align: center; padding: 60px 20px; color: var(--hint); }
  .center-msg .icon { font-size: 48px; margin-bottom: 12px; }
  .center-msg p { font-size: 14px; }
  .empty-filtered { text-align: center; padding: 40px 20px; color: var(--hint); font-size: 14px; }
  .skeleton { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; height: 100px; margin-bottom: 10px; animation: pulse 1.5s ease-in-out infinite; }
  .skeleton:nth-child(2) { height: 80px; opacity: 0.6; }
  .skeleton:nth-child(3) { height: 120px; opacity: 0.3; }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 0.8s linear infinite; }
</style>
</head>
<body>
<div class="bg-mesh"><div class="bg-orb"></div></div>
<div class="app">

<div class="header">
  <div class="header-top">
    <div class="logo">ДАОГруп Задачи</div>
    <button class="refresh-btn" id="refreshBtn">↻</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Поиск по названию...">
  </div>
  <div class="filters" id="statusFilters">
    <button class="pill active" data-status="all">Все</button>
    <button class="pill" data-status="new">Новые</button>
    <button class="pill" data-status="progress">В работе</button>
    <button class="pill" data-status="review">Проверка</button>
    <button class="pill" data-status="done">Готово</button>
    <button class="pill" data-status="hold">Пауза</button>
  </div>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-num" id="sTotal">—</div><div class="stat-label">Всего</div></div>
  <div class="stat-card"><div class="stat-num" style="color:var(--a4)" id="sProgress">—</div><div class="stat-label">В работе</div></div>
  <div class="stat-card"><div class="stat-num" style="color:var(--a3)" id="sDone">—</div><div class="stat-label">Готово</div></div>
  <div class="stat-card"><div class="stat-num" style="color:var(--a2)" id="sOverdue">—</div><div class="stat-label">Просрочено</div></div>
</div>

<div class="task-list" id="taskList">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <button class="close-btn" id="closeModal">Закрыть</button>
  </div>
</div>

<button class="fab" id="fabBtn">+</button>

<div class="add-modal-overlay" id="addModalOverlay">
  <div class="add-modal">
    <div class="modal-handle"></div>
    <div id="addFormContent">
      <h2>✨ Новая задача</h2>
      <div class="form-field">
        <label class="form-label">Название <span>*</span></label>
        <input class="form-input" id="fTitle" placeholder="Введите название задачи..." maxlength="200">
      </div>
      <div class="form-field">
        <label class="form-label">Описание</label>
        <textarea class="form-textarea" id="fDesc" placeholder="Подробное описание..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="form-label">Приоритет</label>
          <select class="form-select" id="fPriority">
            <option value="Нормальный">⚪ Нормальный</option>
            <option value="Низкий">🟢 Низкий</option>
            <option value="Высокий">🟡 Высокий</option>
            <option value="Критично">🔴 Критично</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Статус</label>
          <select class="form-select" id="fStatus">
            <option value="Новая">Новая</option>
            <option value="В процессе">В процессе</option>
            <option value="На проверке">На проверке</option>
            <option value="Выполнено">Выполнено</option>
          </select>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Ответственный</label>
        <input class="form-input" id="fAssigned" placeholder="Имя сотрудника...">
      </div>
      <div class="form-field">
        <label class="form-label">Дедлайн</label>
        <input class="form-input" type="date" id="fDueDate">
      </div>
      <button class="submit-btn" id="submitTaskBtn">Создать задачу</button>
      <button class="cancel-btn" id="cancelAddBtn">Отмена</button>
    </div>
  </div>
</div>

</div>
<script>
  const tg = window.Telegram?.WebApp || { ready:()=>{}, expand:()=>{}, BackButton:{show:()=>{},hide:()=>{},onClick:()=>{},offClick:()=>{}} };
  tg.ready(); tg.expand();

  const API_URL = 'https://default98f669c93c304d33969094a178c687.11.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ff3cbd1dc1524e3fb6a57cb83635138a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=5zrRQuxYpDzc9fdL-79dXiIXABAUUPiCAIM7TzwyuN8';
  const ADD_API_URL = 'https://default98f669c93c304d33969094a178c687.11.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6a899ff8611c42b480e981d873abd065/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=bopzWCudXSdWiZ9vzn0Mp9TxeYS94Kc5cym13rblt5U';

  let allTasks=[], activeStatus='all', searchQuery='';

  function getStatusKey(s){if(!s)return'new';const v=s.toLowerCase();if(v.includes('процес')||v.includes('работ')||v.includes('progress'))return'progress';if(v.includes('выполн')||v.includes('готов')||v.includes('done')||v.includes('завершен'))return'done';if(v.includes('пауз')||v.includes('hold'))return'hold';if(v.includes('провер')||v.includes('review'))return'review';return'new';}
  function getStatusLabel(k){return{new:'Новая',progress:'В работе',done:'Готово',hold:'На паузе',review:'На проверке'}[k]||k;}
  function getPriorityKey(p){if(!p)return'normal';const v=p.toLowerCase();if(v.includes('критич')||v.includes('высок')||v.includes('high'))return'high';if(v.includes('средн')||v.includes('medium'))return'medium';if(v.includes('низк')||v.includes('low'))return'low';return'normal';}
  function getPriorityLabel(k){return{high:'Высокий',medium:'Средний',low:'Низкий',normal:'Обычный'}[k]||k;}
  function formatDate(d){if(!d)return null;try{return new Date(d).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}catch{return d;}}
  function isOverdue(d){return d?new Date(d)<new Date():false;}

  async function loadTasks(){
    const btn=document.getElementById('refreshBtn'); btn.classList.add('spinning');
    try{
      const res=await fetch(API_URL,{method:'POST'}); const text=await res.text();
      let data; try{data=JSON.parse(text);}catch{data={};}
      let items=[];
      if(Array.isArray(data))items=data;
      else if(Array.isArray(data.value))items=data.value;
      else if(Array.isArray(data.tasks))items=data.tasks;
      else if(data.body){const b=typeof data.body==='string'?JSON.parse(data.body):data.body;items=Array.isArray(b)?b:(Array.isArray(b.value)?b.value:[]);}
      else{for(const k of Object.keys(data)){if(Array.isArray(data[k])){items=data[k];break;}}}
      allTasks=items.map(item=>{
        const f=item.fields||item;
        const ev=field=>!field?'':typeof field==='string'?field:field.Value||field.LookupValue||field.Title||String(field.Id||'');
        const eu=field=>!field?'':typeof field==='string'?field:field.DisplayName||field.LookupValue||(field.Claims?field.Claims.match(/\|([^|]+)$/)?.[1]||field.Claims:'');
        return{id:f.id||f.ID||Math.random(),title:f.Title||f.Название||'Без названия',description:f.Description||f['Описание задач']||f.Описание||'',status:ev(f.Status||f.Статус||f['Статус задачи']),priority:ev(f.Priority||f.Приоритет||f['Приоритет Value']),assigned:eu(f.AssignedTo||f.Assignedto0||f.Ответственный||f.Assigned),dueDate:f.DueDate||f['Дата завершения']||f.Deadline||null};
      });
      updateStats(); renderTasks();
    }catch(e){document.getElementById('taskList').innerHTML=`<div class="center-msg"><div class="icon">⚠️</div><p>Ошибка загрузки.<br>${e.message}</p></div>`;}
    finally{btn.classList.remove('spinning');}
  }

  function updateStats(){document.getElementById('sTotal').textContent=allTasks.length;document.getElementById('sProgress').textContent=allTasks.filter(t=>getStatusKey(t.status)==='progress').length;document.getElementById('sDone').textContent=allTasks.filter(t=>getStatusKey(t.status)==='done').length;document.getElementById('sOverdue').textContent=allTasks.filter(t=>isOverdue(t.dueDate)&&getStatusKey(t.status)!=='done').length;}

  function renderTasks(){
    const list=document.getElementById('taskList');
    let tasks=allTasks;
    if(activeStatus!=='all')tasks=tasks.filter(t=>getStatusKey(t.status)===activeStatus);
    if(searchQuery)tasks=tasks.filter(t=>t.title.toLowerCase().includes(searchQuery.toLowerCase()));
    if(!tasks.length){list.innerHTML=`<div class="empty-filtered">🔍 Задач не найдено</div>`;return;}
    list.innerHTML=tasks.map((t,i)=>{
      const sk=getStatusKey(t.status),pk=getPriorityKey(t.priority),due=formatDate(t.dueDate),over=isOverdue(t.dueDate)&&sk!=='done';
      return`<div class="task-card" style="animation-delay:${i*0.04}s" onclick="openDetail(${JSON.stringify(t).replace(/"/g,'&quot;')})">
        <div class="task-header">
          <div class="task-title">${t.title}</div>
          <span class="priority-pill ${pk}">${getPriorityLabel(pk)}</span>
        </div>
        ${t.description?`<div class="task-desc">${t.description}</div>`:''}
        <div class="task-footer">
          <span class="badge ${sk}">${getStatusLabel(sk)}</span>
          ${t.assigned?`<span class="meta-item">👤 ${t.assigned}</span>`:''}
          ${due?`<span class="meta-item ${over?'overdue':''}">📅 ${due}${over?' ⚠️':''}</span>`:''}
        </div>
      </div>`;
    }).join('');
  }

  function openDetail(task){
    if(typeof task==='string')task=JSON.parse(task);
    const sk=getStatusKey(task.status),due=formatDate(task.dueDate),over=isOverdue(task.dueDate)&&sk!=='done';
    document.getElementById('modalTitle').textContent=task.title;
    document.getElementById('modalBody').innerHTML=`
      <div class="detail-row"><div class="detail-label">Статус</div><div class="detail-value"><span class="badge ${sk}">${getStatusLabel(sk)}</span></div></div>
      ${task.assigned?`<div class="detail-row"><div class="detail-label">Ответственный</div><div class="detail-value">👤 ${task.assigned}</div></div>`:''}
      ${due?`<div class="detail-row"><div class="detail-label">Дедлайн</div><div class="detail-value ${over?'overdue':''}" style="${over?'color:var(--a2)':''}">📅 ${due}${over?' — Просрочено!':''}</div></div>`:''}
      ${task.description?`<div class="divider"></div><div style="font-size:12px;color:var(--hint);font-weight:600;margin-bottom:6px">Описание</div><div style="font-size:13px;color:var(--hint);line-height:1.6">${task.description}</div>`:''}`;
    document.getElementById('modalOverlay').classList.add('open');
    tg.BackButton.offClick(closeDetail); tg.BackButton.show(); tg.BackButton.onClick(closeDetail);
  }
  function closeDetail(){document.getElementById('modalOverlay').classList.remove('open');tg.BackButton.hide();}

  const FORM_HTML=document.getElementById('addFormContent').innerHTML;
  function openAddModal(){
    document.getElementById('addFormContent').innerHTML=FORM_HTML;
    document.getElementById('submitTaskBtn').onclick=submitTask;
    document.getElementById('cancelAddBtn').onclick=closeAddModal;
    document.getElementById('addModalOverlay').classList.add('open');
    tg.BackButton.offClick(closeAddModal); tg.BackButton.show(); tg.BackButton.onClick(closeAddModal);
  }
  function closeAddModal(){document.getElementById('addModalOverlay').classList.remove('open');tg.BackButton.hide();}

  async function submitTask(){
    const title=document.getElementById('fTitle').value.trim();
    if(!title){document.getElementById('fTitle').focus();document.getElementById('fTitle').style.borderColor='var(--a2)';return;}
    document.getElementById('fTitle').style.borderColor='';
    const btn=document.getElementById('submitTaskBtn'); btn.disabled=true; btn.textContent='Создаём...';
    const payload={Title:title,Description:document.getElementById('fDesc').value.trim(),Priority:document.getElementById('fPriority').value,Status:document.getElementById('fStatus').value,Assigned:document.getElementById('fAssigned').value.trim(),DueDate:document.getElementById('fDueDate').value||null};
    try{
      const res=await fetch(ADD_API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(res.ok||res.status===202){
        document.getElementById('addFormContent').innerHTML=`<div class="form-success"><div class="icon">✅</div><h3>Задача создана!</h3><p>"${title}" добавлена в список</p><button class="submit-btn" style="margin-top:20px" onclick="closeAddModal();loadTasks();">Обновить список</button><button class="cancel-btn" onclick="closeAddModal()">Закрыть</button></div>`;
      }else throw new Error('HTTP '+res.status);
    }catch(e){btn.disabled=false;btn.textContent='Создать задачу';alert('Ошибка: '+e.message);}
  }

  document.getElementById('closeModal').onclick=closeDetail;
  document.getElementById('modalOverlay').onclick=e=>{if(e.target===document.getElementById('modalOverlay'))closeDetail();};
  document.getElementById('refreshBtn').onclick=loadTasks;
  document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderTasks();});
  document.getElementById('statusFilters').addEventListener('click',e=>{const pill=e.target.closest('.pill[data-status]');if(!pill)return;document.querySelectorAll('[data-status]').forEach(p=>p.classList.remove('active'));pill.classList.add('active');activeStatus=pill.dataset.status;renderTasks();});
  document.getElementById('fabBtn').onclick=openAddModal;
  document.getElementById('addModalOverlay').onclick=e=>{if(e.target===document.getElementById('addModalOverlay'))closeAddModal();};

  loadTasks();
</script>
</body>
</html>
