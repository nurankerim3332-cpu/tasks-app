<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мониторинг задач</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0f0f13);
      --bg2: var(--tg-theme-secondary-bg-color, #1a1a22);
      --text: var(--tg-theme-text-color, #f0f0f5);
      --hint: var(--tg-theme-hint-color, #8888aa);
      --accent: var(--tg-theme-button-color, #6c63ff);
      --accent2: #ff6b6b;
      --accent3: #43e97b;
      --accent4: #f7971e;
      --border: rgba(255,255,255,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 10px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .header h1 span { color: var(--accent); }

    .refresh-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--bg2);
      color: var(--hint);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .refresh-btn:active { transform: scale(0.9); color: var(--accent); }
    .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .search-wrap input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px 10px 38px;
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--hint); }
    .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--hint);
      font-size: 15px;
      pointer-events: none;
    }

    /* ── Filter pills ── */
    .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .filters::-webkit-scrollbar { display: none; }

    .filter-group { display: flex; gap: 6px; flex-shrink: 0; }

    .pill {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--hint);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      font-family: 'Manrope', sans-serif;
    }
    .pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .pill-sep {
      width: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── Stats bar ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px 16px;
    }
    .stat-card {
      background: var(--bg2);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .stat-num {
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 2px;
    }
    .stat-label { font-size: 10px; color: var(--hint); font-weight: 500; }

    /* ── Task list ── */
    .task-list { padding: 0 16px 100px; }

    .task-card {
      background: var(--bg2);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.18s;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-card:active { transform: scale(0.98); border-color: var(--accent); }

    .task-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .task-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      flex: 1;
    }

    .priority-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .priority-dot.high    { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .priority-dot.medium  { background: var(--accent4); box-shadow: 0 0 6px var(--accent4); }
    .priority-dot.low     { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }
    .priority-dot.normal  { background: var(--hint); }

    .task-desc {
      font-size: 12px;
      color: var(--hint);
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .task-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .badge.new       { background: rgba(108,99,255,0.18); color: #9b94ff; }
    .badge.progress  { background: rgba(247,151,30,0.18); color: var(--accent4); }
    .badge.done      { background: rgba(67,233,123,0.18); color: var(--accent3); }
    .badge.hold      { background: rgba(136,136,170,0.18); color: var(--hint); }
    .badge.review    { background: rgba(255,107,107,0.18); color: var(--accent2); }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--hint);
    }
    .meta-item.overdue { color: var(--accent2); }

    /* ── Detail modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg2);
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 40px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      border-top: 1px solid var(--border);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .detail-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: flex-start;
    }
    .detail-label {
      font-size: 12px;
      color: var(--hint);
      font-weight: 600;
      min-width: 100px;
      padding-top: 2px;
    }
    .detail-value {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
      line-height: 1.4;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .modal-desc {
      font-size: 13px;
      color: var(--hint);
      line-height: 1.6;
    }

    .close-btn {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
    }

    /* ── Empty / Loading ── */
    .center-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--hint);
    }
    .center-msg .icon { font-size: 48px; margin-bottom: 12px; }
    .center-msg p { font-size: 14px; }

    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 25%, rgba(255,255,255,0.04) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 16px;
      height: 100px;
      margin-bottom: 10px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .empty-filtered {
      text-align: center;
      padding: 40px 20px;
      color: var(--hint);
      font-size: 14px;
    }

    /* ── FAB кнопка ── */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(108,99,255,0.5);
      z-index: 150;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:active { transform: scale(0.92); }

    /* ── Add Task Modal ── */
    .add-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .add-modal-overlay.open { opacity: 1; pointer-events: all; }
    .add-modal {
      background: var(--bg2);
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 40px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      border-top: 1px solid var(--border);
    }
    .add-modal-overlay.open .add-modal { transform: translateY(0); }
    .add-modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 18px; }
    .form-field { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--hint); margin-bottom: 6px; display: block; }
    .form-label span { color: var(--accent2); }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--hint); }
    .form-textarea { resize: none; height: 80px; line-height: 1.5; }
    .form-select option { background: #1a1a22; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .submit-btn {
      width: 100%; padding: 14px; border-radius: 14px; border: none;
      background: var(--accent); color: #fff; font-family: 'Manrope', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .cancel-btn {
      width: 100%; padding: 12px; border-radius: 14px; border: 1px solid var(--border);
      background: transparent; color: var(--hint); font-family: 'Manrope', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    .form-success { text-align: center; padding: 30px 20px; }
    .form-success .icon { font-size: 52px; margin-bottom: 12px; }
    .form-success h3 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .form-success p { font-size: 13px; color: var(--hint); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Задачи <span>ДАОГруп</span></h1>
    <button class="refresh-btn" id="refreshBtn" title="Обновить">↻</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Поиск по названию...">
  </div>
  <div class="filters">
    <div class="filter-group" id="statusFilters">
      <button class="pill active" data-status="all">Все</button>
      <button class="pill" data-status="new">Новые</button>
      <button class="pill" data-status="progress">В работе</button>
      <button class="pill" data-status="review">Проверка</button>
      <button class="pill" data-status="done">Готово</button>
      <button class="pill" data-status="hold">Пауза</button>
    </div>
    <div class="pill-sep"></div>
    <div class="filter-group" id="priorityFilters">
      <button class="pill active" data-priority="all">🔵 Все</button>
      <button class="pill" data-priority="high">🔴 Высокий</button>
      <button class="pill" data-priority="medium">🟡 Средний</button>
      <button class="pill" data-priority="low">🟢 Низкий</button>
    </div>
  </div>
</div>

<div class="stats" id="statsBar">
  <div class="stat-card"><div class="stat-num" id="sTotal">—</div><div class="stat-label">Всего</div></div>
  <div class="stat-card"><div class="stat-num" style="color:var(--accent4)" id="sProgress">—</div><div class="stat-label">В работе</div></div>
  <div class="stat-card"><div class="stat-num" style="color:var(--accent3)" id="sDone">—</div><div class="stat-label">Готово</div></div>
  <div class="stat-card"><div class="stat-num" style="color:var(--accent2)" id="sOverdue">—</div><div class="stat-label">Просрочено</div></div>
</div>

<div class="task-list" id="taskList">
  <div class="skeleton"></div>
  <div class="skeleton" style="height:80px;opacity:0.6"></div>
  <div class="skeleton" style="height:120px;opacity:0.3"></div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <button class="close-btn" id="closeModal">Закрыть</button>
  </div>
</div>


<!-- FAB -->
<button class="fab" id="fabBtn" title="Добавить задачу">+</button>

<!-- Add Task Modal -->
<div class="add-modal-overlay" id="addModalOverlay">
  <div class="add-modal" id="addModal">
    <div class="modal-handle"></div>
    <div id="addFormContent">
      <h2>✏️ Новая задача</h2>
      <div class="form-field">
        <label class="form-label">Название <span>*</span></label>
        <input class="form-input" id="fTitle" placeholder="Введите название задачи..." maxlength="200">
      </div>
      <div class="form-field">
        <label class="form-label">Описание</label>
        <textarea class="form-textarea" id="fDesc" placeholder="Подробное описание..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="form-label">Приоритет</label>
          <select class="form-select" id="fPriority">
            <option value="Нормальный">⚪ Нормальный</option>
            <option value="Низкий">🟢 Низкий</option>
            <option value="Высокий">🟡 Высокий</option>
            <option value="Критично">🔴 Критично</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Статус</label>
          <select class="form-select" id="fStatus">
            <option value="Новая">Новая</option>
            <option value="В процессе">В процессе</option>
            <option value="На проверке">На проверке</option>
            <option value="Выполнено">Выполнено</option>
          </select>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">Ответственный</label>
        <input class="form-input" id="fAssigned" placeholder="Имя сотрудника...">
      </div>
      <div class="form-field">
        <label class="form-label">Дедлайн</label>
        <input class="form-input" type="date" id="fDueDate">
      </div>
      <button class="submit-btn" id="submitTaskBtn">Создать задачу</button>
      <button class="cancel-btn" id="cancelAddBtn">Отмена</button>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // ⚠️ ЗАМЕНИ НА СВОЙ URL ИЗ POWER AUTOMATE / MAKE.COM
  const API_URL = 'https://default98f669c93c304d33969094a178c687.11.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ff3cbd1dc1524e3fb6a57cb83635138a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=5zrRQuxYpDzc9fdL-79dXiIXABAUUPiCAIM7TzwyuN8';

  let allTasks = [];
  let activeStatus = 'all';
  let activePriority = 'all';
  let searchQuery = '';

  // ── Helpers ──────────────────────────────────────────
  function getStatusKey(s) {
    if (!s) return 'new';
    const v = s.toLowerCase();
    // В процессе / В работе
    if (v.includes('процес') || v.includes('работ') || v.includes('progress') || v.includes('in progress')) return 'progress';
    // Выполнено / Готово / Завершено
    if (v.includes('выполн') || v.includes('готов') || v.includes('done') || v.includes('завершен') || v.includes('complete')) return 'done';
    // На паузе / Отложено
    if (v.includes('пауз') || v.includes('hold') || v.includes('отложен') || v.includes('заморож')) return 'hold';
    // На проверке / Review
    if (v.includes('провер') || v.includes('review') || v.includes('тестир')) return 'review';
    // Новая
    if (v.includes('нов') || v.includes('new') || v.includes('открыт') || v.includes('open')) return 'new';
    return 'new';
  }

  function getStatusLabel(k) {
    return { new:'Новая', progress:'В работе', done:'Готово', hold:'На паузе', review:'На проверке' }[k] || k;
  }

  function getPriorityKey(p) {
    if (!p) return 'normal';
    const v = p.toLowerCase();
    // Критично / Критический → высокий
    if (v.includes('критич') || v.includes('critical') || v.includes('высок') || v.includes('high') || v === '1') return 'high';
    // Средний / Medium
    if (v.includes('средн') || v.includes('medium') || v === '2') return 'medium';
    // Низкий / Low
    if (v.includes('низк') || v.includes('low') || v === '3') return 'low';
    // Нормальный / Normal
    if (v.includes('нормал') || v.includes('normal') || v.includes('обычн')) return 'normal';
    return 'normal';
  }

  function getPriorityLabel(k) {
    return { high:'🔴 Высокий', medium:'🟡 Средний', low:'🟢 Низкий', normal:'⚪ Обычный' }[k] || k;
  }

  function formatDate(d) {
    if (!d) return null;
    try {
      const dt = new Date(d);
      return dt.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
    } catch { return d; }
  }

  function isOverdue(d) {
    if (!d) return false;
    return new Date(d) < new Date();
  }

  // ── Fetch tasks ───────────────────────────────────────
  async function loadTasks() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');

    try {
      const res = await fetch(API_URL, { method: 'POST' });
      const text = await res.text();
      console.log('API response:', text.substring(0, 500));
      let data;
      try { data = JSON.parse(text); } catch(e) { data = {}; }

      // Ищем массив в любом месте ответа
      let items = [];
      if (Array.isArray(data)) items = data;
      else if (Array.isArray(data.value)) items = data.value;
      else if (Array.isArray(data.tasks)) items = data.tasks;
      else if (data.body) {
        const b = typeof data.body === 'string' ? JSON.parse(data.body) : data.body;
        items = Array.isArray(b) ? b : (Array.isArray(b.value) ? b.value : []);
      } else {
        for (const key of Object.keys(data)) {
          if (Array.isArray(data[key])) { items = data[key]; break; }
        }
      }

      allTasks = items.map(item => {
        const f = item.fields || item;

        // SharePoint возвращает lookup-поля как объекты { Value: "...", Id: N }
        function extractVal(field) {
          if (!field) return '';
          if (typeof field === 'string') return field;
          if (typeof field === 'object') return field.Value || field.LookupValue || field.Title || String(field.Id || '');
          return String(field);
        }

        // Ответственный — объект с Claims или LookupValue
        function extractUser(field) {
          if (!field) return '';
          if (typeof field === 'string') return field;
          if (typeof field === 'object') {
            // Берём DisplayName, LookupValue или email из Claims
            if (field.DisplayName) return field.DisplayName;
            if (field.LookupValue) return field.LookupValue;
            if (field.Claims) {
              const m = field.Claims.match(/\|([^|]+)$/);
              return m ? m[1] : field.Claims;
            }
          }
          return '';
        }

        return {
          id:          f.id || f.ID || f.ItemInternalId || Math.random(),
          title:       f.Title || f.Название || 'Без названия',
          description: f.Description || f['Описание задач'] || f.Описание || '',
          status:      extractVal(f.Status || f.Статус || f['Статус задачи']),
          priority:    extractVal(f.Priority || f.Приоритет || f['Приоритет Value']),
          assigned:    extractUser(f.AssignedTo || f.Assignedto0 || f['Ответственный'] || f.Assigned),
          dueDate:     f.DueDate || f['Дата завершения'] || f.Deadline || null,
          created:     f.Created || null,
        };
      });
      updateStats();
      renderTasks();
    } catch (e) {
      document.getElementById('taskList').innerHTML = `
        <div class="center-msg">
          <div class="icon">⚠️</div>
          <p>Не удалось загрузить задачи.<br>Проверь URL и подключение.</p>
          <p style="margin-top:8px;font-size:12px;opacity:0.5">${e.message}</p>
        </div>`;
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // ── Stats ─────────────────────────────────────────────
  function updateStats() {
    const total    = allTasks.length;
    const progress = allTasks.filter(t => getStatusKey(t.status) === 'progress').length;
    const done     = allTasks.filter(t => getStatusKey(t.status) === 'done').length;
    const overdue  = allTasks.filter(t => isOverdue(t.dueDate) && getStatusKey(t.status) !== 'done').length;
    document.getElementById('sTotal').textContent    = total;
    document.getElementById('sProgress').textContent = progress;
    document.getElementById('sDone').textContent     = done;
    document.getElementById('sOverdue').textContent  = overdue;
  }

  // ── Render ────────────────────────────────────────────
  function renderTasks() {
    const list = document.getElementById('taskList');
    let tasks = allTasks;

    if (activeStatus !== 'all')
      tasks = tasks.filter(t => getStatusKey(t.status) === activeStatus);
    if (activePriority !== 'all')
      tasks = tasks.filter(t => getPriorityKey(t.priority) === activePriority);
    if (searchQuery)
      tasks = tasks.filter(t => t.title.toLowerCase().includes(searchQuery.toLowerCase()));

    if (!tasks.length) {
      list.innerHTML = `<div class="empty-filtered">🔍 Задач не найдено.<br>Попробуй изменить фильтры.</div>`;
      return;
    }

    list.innerHTML = tasks.map((t, i) => {
      const sk = getStatusKey(t.status);
      const pk = getPriorityKey(t.priority);
      const due = formatDate(t.dueDate);
      const over = isOverdue(t.dueDate) && sk !== 'done';

      return `
        <div class="task-card" style="animation-delay:${i * 0.04}s" onclick="openDetail(${JSON.stringify(t).replace(/"/g,'&quot;')})">
          <div class="task-header">
            <div class="task-title">${t.title}</div>
            <div class="priority-dot ${pk}"></div>
          </div>
          ${t.description ? `<div class="task-desc">${t.description}</div>` : ''}
          <div class="task-footer">
            <span class="badge ${sk}">${getStatusLabel(sk)}</span>
            ${t.assigned ? `<span class="meta-item">👤 ${t.assigned}</span>` : ''}
            ${due ? `<span class="meta-item ${over ? 'overdue' : ''}">📅 ${due}${over ? ' ⚠️' : ''}</span>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ── Detail modal ──────────────────────────────────────
  function openDetail(task) {
    if (typeof task === 'string') task = JSON.parse(task);
    const sk = getStatusKey(task.status);
    const pk = getPriorityKey(task.priority);
    const due = formatDate(task.dueDate);
    const over = isOverdue(task.dueDate) && sk !== 'done';

    document.getElementById('modalTitle').textContent = task.title;
    document.getElementById('modalBody').innerHTML = `
      <div class="detail-row">
        <div class="detail-label">Статус</div>
        <div class="detail-value"><span class="badge ${sk}">${getStatusLabel(sk)}</span></div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Приоритет</div>
        <div class="detail-value">${getPriorityLabel(pk)}</div>
      </div>
      ${task.assigned ? `<div class="detail-row">
        <div class="detail-label">Ответственный</div>
        <div class="detail-value">👤 ${task.assigned}</div>
      </div>` : ''}
      ${due ? `<div class="detail-row">
        <div class="detail-label">Дедлайн</div>
        <div class="detail-value ${over ? 'overdue' : ''}" style="${over ? 'color:var(--accent2)' : ''}">
          📅 ${due}${over ? ' — Просрочено!' : ''}
        </div>
      </div>` : ''}
      ${task.description ? `
        <div class="divider"></div>
        <div style="font-size:12px;color:var(--hint);font-weight:600;margin-bottom:6px">Описание</div>
        <div class="modal-desc">${task.description}</div>
      ` : ''}`;

    document.getElementById('modalOverlay').classList.add('open');
    tg.BackButton.show();
    tg.BackButton.onClick(closeDetail);
  }

  function closeDetail() {
    document.getElementById('modalOverlay').classList.remove('open');
    tg.BackButton.hide();
  }

  // ── Events ────────────────────────────────────────────
  document.getElementById('closeModal').onclick = closeDetail;
  document.getElementById('modalOverlay').onclick = e => {
    if (e.target === document.getElementById('modalOverlay')) closeDetail();
  };
  document.getElementById('refreshBtn').onclick = loadTasks;

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderTasks();
  });

  document.getElementById('statusFilters').addEventListener('click', e => {
    const pill = e.target.closest('.pill[data-status]');
    if (!pill) return;
    document.querySelectorAll('[data-status]').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeStatus = pill.dataset.status;
    renderTasks();
  });

  document.getElementById('priorityFilters').addEventListener('click', e => {
    const pill = e.target.closest('.pill[data-priority]');
    if (!pill) return;
    document.querySelectorAll('[data-priority]').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activePriority = pill.dataset.priority;
    renderTasks();
  });


  // ── Add Task ──────────────────────────────────────────
  // ⚠️ ЗАМЕНИ НА URL СВОЕГО FLOW ДЛЯ СОЗДАНИЯ ЗАДАЧИ В POWER AUTOMATE
  const ADD_API_URL = 'https://default98f669c93c304d33969094a178c687.11.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6a899ff8611c42b480e981d873abd065/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=bopzWCudXSdWiZ9vzn0Mp9TxeYS94Kc5cym13rblt5U';

  const FORM_ORIGINAL_HTML = document.getElementById('addFormContent').innerHTML;

  function openAddModal() {
    // Восстановить оригинальную форму (на случай если показывался success)
    document.getElementById('addFormContent').innerHTML = FORM_ORIGINAL_HTML;
    // Привязать кнопки
    document.getElementById('submitTaskBtn').onclick = submitTask;
    document.getElementById('cancelAddBtn').onclick = closeAddModal;
    document.getElementById('addModalOverlay').classList.add('open');
    tg.BackButton.offClick(closeAddModal);
    tg.BackButton.show();
    tg.BackButton.onClick(closeAddModal);
  }

  function closeAddModal() {
    document.getElementById('addModalOverlay').classList.remove('open');
    tg.BackButton.hide();
  }

  async function submitTask() {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) {
      document.getElementById('fTitle').focus();
      document.getElementById('fTitle').style.borderColor = 'var(--accent2)';
      return;
    }
    document.getElementById('fTitle').style.borderColor = '';

    const btn = document.getElementById('submitTaskBtn');
    btn.disabled = true;
    btn.textContent = 'Создаём...';

    const payload = {
      Title:       title,
      Description: document.getElementById('fDesc').value.trim(),
      Priority:    document.getElementById('fPriority').value,
      Status:      document.getElementById('fStatus').value,
      Assigned:    document.getElementById('fAssigned').value.trim(),
      DueDate:     document.getElementById('fDueDate').value || null,
    };

    try {
      const res = await fetch(ADD_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok || res.status === 202) {
        // Показать успех
        document.getElementById('addFormContent').innerHTML = `
          <div class="form-success">
            <div class="icon">✅</div>
            <h3>Задача создана!</h3>
            <p style="margin-bottom:20px">"${title}" добавлена в список</p>
            <button class="submit-btn" onclick="closeAddModal(); loadTasks();">Обновить список</button>
            <button class="cancel-btn" onclick="closeAddModal()">Закрыть</button>
          </div>`;
      } else {
        throw new Error('HTTP ' + res.status);
      }
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Создать задачу';
      alert('Ошибка: ' + e.message + '\nПроверь ADD_API_URL в коде.');
    }
  }

  // FAB
  document.getElementById('fabBtn').onclick = openAddModal;
  document.getElementById('addModalOverlay').onclick = e => {
    if (e.target === document.getElementById('addModalOverlay')) closeAddModal();
  };

  // ── Init ──────────────────────────────────────────────
  loadTasks();
</script>
</body>
</html>
